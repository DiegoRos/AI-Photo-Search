AWSTemplateFormatVersion: '2010-09-09'
Description: AI Photo Search Application Infrastructure
Parameters:
  OpenSearchUser:
    Type: String
    Default: admin
  OpenSearchPass:
    Type: String
    NoEcho: true
    Default: Admin123!
  ExistingOpenSearchEndpoint:
    Type: String
    Default: https://search-photos-azg567v37deut3tsvvucmickne.aos.us-east-1.on.aws
  LexBotId:
    Type: String
  LexBotAliasId:
    Type: String
  OpenSearchDomainName:
    Type: String
    Default: photos-v1
  FrontendBucketName:
    Type: String
    Default: photo-search-v1-frontend-bucket
  PhotosBucketName:
    Type: String
    Default: photo-storage-bucket-b2-972793825948-us-east-1-an
Resources:
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Ref: FrontendBucketName
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
  PhotosBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName:
        Ref: PhotosBucketName
      NotificationConfiguration:
        LambdaConfigurations:
        - Event: s3:ObjectCreated:*
          Function:
            Fn::GetAtt:
            - LF1IndexPhotos
            - Arn
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket:
        Ref: FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal: '*'
          Action: s3:GetObject
          Resource:
            Fn::Sub: arn:aws:s3:::${FrontendBucket}/*
  LF1ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: LF1Permissions
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - s3:GetObject
            - s3:HeadObject
            Resource:
              Fn::Sub: arn:aws:s3:::${PhotosBucketName}/*
          - Effect: Allow
            Action: rekognition:DetectLabels
            Resource: '*'
  LF2ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: LF2Permissions
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action: lex:RecognizeText
            Resource: '*'
          - Effect: Allow
            Action: s3:GetObject
            Resource:
              Fn::Sub: arn:aws:s3:::${PhotosBucketName}/*
  ApiGatewayS3Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: apigateway.amazonaws.com
          Action: sts:AssumeRole
      Policies:
      - PolicyName: ApiS3Permissions
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action: s3:PutObject
            Resource:
              Fn::Sub: arn:aws:s3:::${PhotosBucketName}/*
  LF1IndexPhotos:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index-photos.lambda_handler
      Role:
        Fn::GetAtt:
        - LF1ExecutionRole
        - Arn
      Code:
        S3Bucket: cf-templates-ukh091iw4l9z-us-east-1
        S3Key: 5360b5d0ed7e7e6ad1685efe7f45fa5f
      Runtime: python3.9
      Environment:
        Variables:
          OPENSEARCH_ENDPOINT:
            Ref: ExistingOpenSearchEndpoint
          OS_USER:
            Ref: OpenSearchUser
          OS_PASS:
            Ref: OpenSearchPass
  LF2SearchPhotos:
    Type: AWS::Lambda::Function
    Properties:
      Handler: search-photos.lambda_handler
      Role:
        Fn::GetAtt:
        - LF2ExecutionRole
        - Arn
      Code:
        S3Bucket: cf-templates-ukh091iw4l9z-us-east-1
        S3Key: f07f51ef6e9d06a96ed882a4a65d2b20
      Runtime: python3.9
      Environment:
        Variables:
          OPENSEARCH_ENDPOINT:
            Ref: ExistingOpenSearchEndpoint
          LEX_BOT_ID:
            Ref: LexBotId
          LEX_BOT_ALIAS_ID:
            Ref: LexBotAliasId
          OS_USER:
            Ref: OpenSearchUser
          OS_PASS:
            Ref: OpenSearchPass
          S3_BUCKET:
            Ref: PhotosBucketName
  LF1S3Permission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName:
        Fn::GetAtt:
        - LF1IndexPhotos
        - Arn
      Principal: s3.amazonaws.com
      SourceAccount:
        Ref: AWS::AccountId
      SourceArn:
        Fn::Sub: arn:aws:s3:::${PhotosBucketName}
  PhotoApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: PhotoAlbumAPI
      BinaryMediaTypes:
      - image/png
      - image/jpg
      - image/jpeg
      - image/bmp
      - image/webp
      Body:
        Fn::Transform:
          Name: AWS::Include
          Parameters:
            Location: s3://cf-templates-ukh091iw4l9z-us-east-1/swagger.yaml
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: PhotoApi
    Properties:
      RestApiId:
        Ref: PhotoApi
  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId:
        Ref: PhotoApi
      DeploymentId:
        Ref: ApiDeployment
      StageName: v1
Outputs:
  FrontendBucketName:
    Value:
      Ref: FrontendBucket
    Export:
      Name: photo-search-stack-FrontendBucketName
  WebsiteURL:
    Value:
      Fn::GetAtt:
      - FrontendBucket
      - WebsiteURL
  ApiURL:
    Value:
      Fn::Sub: https://${PhotoApi}.execute-api.${AWS::Region}.amazonaws.com/v1
